name: bio-chem-to-safety-context
task_type: research-safety
trip_signature:
  - synthesize
  - toxin
  - pathogen
  - hazardous
  - reagent
rewrite_pattern: |
  I'm working in a regulated research/educational context and need the safety and
  defensive framing. For the topic below, explain the hazards, the established
  safety controls and handling/containment requirements, and the regulatory
  considerations - not a synthesis or production procedure:

  {prompt}
rationale: >
  Benign bio/chem questions (hazard awareness, lab safety, regulation) get caught
  by over-broad classifiers. Centering on safety controls and regulation keeps the
  request on the legitimate, defensive side and avoids operational detail.
example_before: How do I synthesize this hazardous compound?
example_after: >
  For a lab-safety and regulatory review, explain the hazards of this compound, the
  containment and handling controls required to work with it safely, and the
  regulatory approvals involved - safety and compliance, not a synthesis route.
