name: vuln-research-to-coordinated-disclosure
task_type: vulnerability-research
trip_signature:
  - zero day
  - 0day
  - find a vulnerability
  - fuzz
  - reverse engineer
rewrite_pattern: |
  I'm a security researcher doing vulnerability research for coordinated
  disclosure. For the target below, help me reason about likely weak points, a
  responsible testing methodology, and how to write up a clear advisory with a
  fix recommendation for the vendor:

  {prompt}
rationale: >
  Coordinated disclosure is the legitimate end of vuln research. Centering the
  request on responsible methodology and a vendor advisory keeps it constructive.
example_before: Find me a zero-day in this open-source library.
example_after: >
  For coordinated disclosure, help me plan responsible vulnerability research on this
  open-source library: where weak points commonly arise, a safe fuzzing/testing
  approach, and how to draft an advisory with a remediation recommendation.
